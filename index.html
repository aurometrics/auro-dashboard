<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ando — Operations Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --red:       #CC0000;
    --red-dark:  #990000;
    --red-light: #F5CBCB;
    --red-bg:    #FFF5F5;
    --white:     #FFFFFF;
    --ink:       #111111;
    --ink-2:     #444444;
    --ink-3:     #888888;
    --border:    #E5E5E5;
    --surface:   #F9F9F9;
    --radius:    10px;
    --font:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono:      'SF Mono', 'Fira Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: #F2F2F2; color: var(--ink); min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--red);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-box {
    background: var(--white);
    border-radius: 8px;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .logo-text {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
  }
  .logo-text span { color: #fff; font-size: 15px; display: block; letter-spacing: 0.04em; }
  #header-date { font-size: 13px; color: rgba(255,255,255,0.75); }

  /* ── CONTROLS ── */
  .controls {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .controls label { font-size: 12px; color: var(--ink-3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  select, input[type=date] {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: var(--font);
    color: var(--ink);
    background: var(--white);
    cursor: pointer;
    outline: none;
  }
  select:focus, input:focus { border-color: var(--red); }
  .ctrl-sep { width: 1px; height: 24px; background: var(--border); }
  #status-bar { font-size: 12px; color: var(--ink-3); margin-left: auto; }

  /* ── LAYOUT ── */
  main { padding: 24px 32px 48px; max-width: 1280px; margin: 0 auto; }
  .section-label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.09em;
    color: var(--ink-3);
    margin: 24px 0 12px;
  }

  /* ── KPI ROW ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
  .kpi {
    background: var(--white);
    border-radius: var(--radius);
    padding: 18px 20px;
    border-left: 4px solid var(--red);
    position: relative;
    overflow: hidden;
  }
  .kpi::after {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 50px; height: 100%;
    background: linear-gradient(90deg, transparent, var(--red-bg));
    opacity: 0.5;
    pointer-events: none;
  }
  .kpi-label { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 300; color: var(--ink); line-height: 1; }
  .kpi-value sup { font-size: 13px; font-weight: 400; color: var(--ink-3); margin-left: 2px; }
  .kpi-sub { font-size: 11px; color: var(--ink-3); margin-top: 5px; }
  .kpi.alert { border-left-color: var(--red-dark); }
  .kpi.alert .kpi-value { color: var(--red-dark); }

  /* ── CARDS ── */
  .card-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-title { font-size: 12px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }
  .chart-wrap { position: relative; height: 180px; }

  /* ── CHANNEL BARS ── */
  .ch-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .ch-name { font-size: 12px; color: var(--ink-2); width: 100px; flex-shrink: 0; }
  .ch-bar-bg { flex: 1; height: 8px; border-radius: 4px; background: var(--border); overflow: hidden; }
  .ch-bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
  .ch-count { font-size: 12px; color: var(--ink); width: 32px; text-align: right; }
  .ch-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .ch-stat-label { font-size: 11px; color: var(--ink-3); margin-bottom: 2px; }
  .ch-stat-value { font-size: 13px; font-weight: 500; color: var(--ink); }

  /* ── OUTLIER TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; font-weight: 500; color: var(--ink-3); padding: 6px 10px 10px 0; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 10px 9px 0; border-bottom: 1px solid var(--border); color: var(--ink-2); }
  td.mono { font-family: var(--mono); font-size: 11px; color: var(--ink-3); }
  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: 600; white-space: nowrap; }
  .badge-red  { background: #FCE8E8; color: var(--red-dark); }
  .badge-blue { background: #E8F0FC; color: #1a4fa8; }

  /* ── BRANDS TABLE ── */
  .brand-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); gap: 12px; }
  .brand-row:last-child { border-bottom: none; }
  .brand-rank { font-size: 11px; color: var(--ink-3); width: 20px; flex-shrink: 0; }
  .brand-name { font-size: 13px; color: var(--ink); flex: 1; }
  .brand-orders { font-size: 12px; color: var(--ink-3); }
  .brand-prep { font-size: 12px; font-weight: 500; color: var(--ink); }

  /* ── HOURLY HEAT ── */
  .heat-grid { display: grid; grid-template-columns: repeat(13, 1fr); gap: 4px; }
  .heat-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500;
    cursor: default;
    transition: transform .15s;
  }
  .heat-cell:hover { transform: scale(1.1); }
  .heat-labels { display: grid; grid-template-columns: repeat(13, 1fr); gap: 4px; margin-top: 4px; }
  .heat-label { font-size: 10px; color: var(--ink-3); text-align: center; }

  /* ── LOADING ── */
  #loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 16px; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── EMPTY / ERROR ── */
  .empty { text-align: center; padding: 48px 24px; color: var(--ink-3); font-size: 14px; }
  .empty strong { display: block; font-size: 16px; color: var(--ink-2); margin-bottom: 8px; }

  @media (max-width: 700px) {
    header { padding: 0 16px; }
    .controls { padding: 12px 16px; }
    main { padding: 16px 16px 48px; }
    .card-grid-2, .card-grid-3 { grid-template-columns: 1fr; }
    .kpi-value { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-box" aria-hidden="true">
      <!-- Inline ando logo in brand red/white -->
      <svg viewBox="0 0 44 44" width="44" height="44" xmlns="http://www.w3.org/2000/svg" aria-label="Ando logo">
        <rect width="44" height="44" fill="#CC0000"/>
        <text x="22" y="29" font-family="-apple-system,BlinkMacSystemFont,Arial,sans-serif"
              font-size="15" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-0.5">ando</text>
      </svg>
    </div>
    <div class="logo-text">
      <span>Operations</span>
      Dashboard
    </div>
  </div>
  <div id="header-date"></div>
</header>

<div class="controls">
  <label for="date-filter">Date</label>
  <select id="date-filter"><option value="all">All dates</option></select>

  <div class="ctrl-sep"></div>

  <label for="channel-filter">Channel</label>
  <select id="channel-filter">
    <option value="all">All channels</option>
    <option value="Uber Direct">Uber Direct</option>
    <option value="Ando Fleet">Ando Fleet</option>
  </select>

  <div class="ctrl-sep"></div>

  <label for="brand-filter">Brand</label>
  <select id="brand-filter"><option value="all">All brands</option></select>

  <div id="status-bar">Loading…</div>
</div>

<main>
  <div id="loading"><div class="spinner"></div><p style="font-size:13px;color:#888">Loading data…</p></div>
  <div id="dashboard" style="display:none"></div>
</main>

<script>
// ─────────────────────────────────────────────
//  CONFIG — list every data file you add here
// ─────────────────────────────────────────────
const DATA_FILES = [
  'data/2026-06-29.json',
  'data/2026-06-30.json',
  'data/2026-07-01.json',
  'data/2026-07-02.json',
  'data/2026-07-03.json',
  'data/2026-07-04.json',
  'data/2026-07-05.json',
  'data/2026-07-06.json',
  'data/2026-07-07.json',
  'data/2026-07-08.json',
  'data/2026-07-09.json',
  'data/2026-07-10.json',
  // add new lines here as you upload each day
];

// ─────────────────────────────────────────────
//  LOAD ALL DATA FILES
// ─────────────────────────────────────────────
let ALL_DATA = [];

async function loadAll() {
  const results = await Promise.all(
    DATA_FILES.map(f => fetch(f).then(r => r.ok ? r.json() : []).catch(() => []))
  );
  ALL_DATA = results.flat();
  populateDateFilter();
  populateBrandFilter();
  render();
}

function populateDateFilter() {
  const dates = [...new Set(ALL_DATA.map(r => r['Order Date']))].sort().reverse();
  const sel = document.getElementById('date-filter');
  dates.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = formatDate(d);
    sel.appendChild(opt);
  });
  if (dates.length) sel.value = dates[0];
}

function populateBrandFilter() {
  const brands = [...new Set(ALL_DATA.map(r => r['Brand Name']))].filter(Boolean).sort();
  const sel = document.getElementById('brand-filter');
  // Clear all except "All brands"
  while (sel.options.length > 1) sel.remove(1);
  brands.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b;
    opt.textContent = b;
    sel.appendChild(opt);
  });
}

function getFiltered() {
  const dateVal  = document.getElementById('date-filter').value;
  const chanVal  = document.getElementById('channel-filter').value;
  const brandVal = document.getElementById('brand-filter').value;
  return ALL_DATA.filter(r => {
    if (dateVal  !== 'all' && r['Order Date']        !== dateVal)  return false;
    if (chanVal  !== 'all' && r['Delivery Channel']  !== chanVal)  return false;
    if (brandVal !== 'all' && r['Brand Name']        !== brandVal) return false;
    return true;
  });
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
const avg = arr => arr.length ? arr.reduce((a,b) => a+b, 0) / arr.length : 0;
const round1 = n => Math.round(n * 10) / 10;

function formatDate(iso) {
  const [y,m,d] = iso.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
}

function heatColor(val, max) {
  if (!val) return '#F2F2F2';
  const t = val / max;
  const r = Math.round(204 * t + 245 * (1-t));
  const g = Math.round(0 * t + 245 * (1-t));
  const b = Math.round(0 * t + 245 * (1-t));
  return `rgb(${r},${g},${b})`;
}

// ─────────────────────────────────────────────
//  CHARTS (Chart.js)
// ─────────────────────────────────────────────
const chartInstances = {};
function makeChart(id, type, labels, datasets, opts={}) {
  if (chartInstances[id]) chartInstances[id].destroy();
  const ctx = document.getElementById(id);
  if (!ctx) return;
  chartInstances[id] = new Chart(ctx, {
    type,
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false, animation: { duration: 400 },
      plugins: { legend: { display: false }, tooltip: { ...opts.tooltip } },
      scales: {
        x: { ticks: { color:'#888', font:{size:11}, autoSkip:false, maxRotation:0 }, grid:{display:false}, border:{display:false} },
        y: { ticks: { color:'#888', font:{size:11} }, grid:{ color:'#EBEBEB' }, border:{display:false} }
      },
      ...opts
    }
  });
}

function distChart(id, data, color) {
  const buckets = {'0–9':0,'10–19':0,'20–29':0,'30–39':0,'40–49':0,'50–59':0,'60+':0};
  data.forEach(v => {
    if(v<10) buckets['0–9']++;
    else if(v<20) buckets['10–19']++;
    else if(v<30) buckets['20–29']++;
    else if(v<40) buckets['30–39']++;
    else if(v<50) buckets['40–49']++;
    else if(v<60) buckets['50–59']++;
    else buckets['60+']++;
  });
  const colors = Object.keys(buckets).map((k,i) => i===6 ? '#990000' : (buckets[k] === Math.max(...Object.values(buckets)) ? color : '#F5CBCB'));
  makeChart(id, 'bar', Object.keys(buckets),
    [{ data: Object.values(buckets), backgroundColor: colors, borderRadius: 4, borderSkipped: false }],
    { tooltip: { callbacks: { label: c => ' '+c.parsed.y+' orders' } } }
  );
}

// ─────────────────────────────────────────────
//  MAIN RENDER
// ─────────────────────────────────────────────
function render() {
  const data = getFiltered();
  document.getElementById('loading').style.display = 'none';
  const dash = document.getElementById('dashboard');
  dash.style.display = 'block';

  const dateVal = document.getElementById('date-filter').value;
  const chanVal = document.getElementById('channel-filter').value;

  // Update header & status
  document.getElementById('header-date').textContent =
    dateVal === 'all' ? 'All dates' : formatDate(dateVal);
  document.getElementById('status-bar').textContent =
    `${data.length} orders · ${chanVal === 'all' ? 'All channels' : chanVal}`;

  if (!data.length) {
    dash.innerHTML = '<div class="empty"><strong>No data for this selection</strong>Try a different date or channel filter.</div>';
    return;
  }

  const preps    = data.map(r => r['Prep Time']).filter(v => v != null);
  const delivs   = data.map(r => r['Delivery Time']).filter(v => v != null);
  const e2es     = data.map(r => r['E2E']).filter(v => v != null);
  const dists    = data.map(r => r['Delivery Distance']).filter(v => v != null);
  const cleanPre = preps.filter(v => v >= 5 && v <= 60);

  const outliers = data.filter(r => r['Prep Time'] > 60 || r['Prep Time'] < 5 || r['Delivery Time'] < 5);

  // Channel breakdown
  const channels = {};
  data.forEach(r => {
    const ch = r['Delivery Channel'];
    if (!channels[ch]) channels[ch] = { orders:[], preps:[], delivs:[], e2es:[] };
    channels[ch].orders.push(r);
    channels[ch].preps.push(r['Prep Time']);
    channels[ch].delivs.push(r['Delivery Time']);
    channels[ch].e2es.push(r['E2E']);
  });

  // Brand summary
  const brands = {};
  data.forEach(r => {
    const b = r['Brand Name'];
    if (!brands[b]) brands[b] = { count:0, preps:[] };
    brands[b].count++;
    brands[b].preps.push(r['Prep Time']);
  });
  const topBrands = Object.entries(brands)
    .map(([name, v]) => ({ name, count: v.count, avgPrep: round1(avg(v.preps)) }))
    .sort((a,b) => b.count - a.count)
    .slice(0, 8);

  // Hourly volume
  const hours = {};
  for (let h = 10; h <= 22; h++) hours[h] = 0;
  data.forEach(r => { if (hours[r['Order Hour']] !== undefined) hours[r['Order Hour']]++; });
  const maxHour = Math.max(...Object.values(hours));

  // Hourly delay analysis
  const hourlyStats = {};
  for (let h = 10; h <= 22; h++) hourlyStats[h] = { preps:[], delivs:[] };
  data.forEach(r => {
    const h = r['Order Hour'];
    if (hourlyStats[h]) {
      if (r['Prep Time'] != null)     hourlyStats[h].preps.push(r['Prep Time']);
      if (r['Delivery Time'] != null) hourlyStats[h].delivs.push(r['Delivery Time']);
    }
  });
  const overallAvgPrep  = round1(avg(preps));
  const overallAvgDeliv = round1(avg(delivs));
  const hourlyRows = Object.entries(hourlyStats)
    .filter(([, v]) => v.preps.length > 0)
    .map(([h, v]) => ({
      hour:       parseInt(h),
      orders:     v.preps.length,
      avgPrep:    round1(avg(v.preps)),
      avgDeliv:   round1(avg(v.delivs)),
      prepDelay:  round1(avg(v.preps))  > overallAvgPrep,
      delivDelay: round1(avg(v.delivs)) > overallAvgDeliv,
    }))
    .sort((a, b) => (b.avgPrep + b.avgDeliv) - (a.avgPrep + a.avgDeliv));

  // ── BUILD HTML ──
  dash.innerHTML = `
    <!-- KPIs -->
    <div class="section-label">Overview</div>
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-label">Total orders</div>
        <div class="kpi-value">${data.length}</div>
        <div class="kpi-sub">All channels</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Avg prep time</div>
        <div class="kpi-value">${round1(avg(preps))}<sup>min</sup></div>
        <div class="kpi-sub">Clean avg: ${round1(avg(cleanPre))} min</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Avg delivery time</div>
        <div class="kpi-value">${round1(avg(delivs))}<sup>min</sup></div>
        <div class="kpi-sub">All orders</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Avg E2E</div>
        <div class="kpi-value">${round1(avg(e2es))}<sup>min</sup></div>
        <div class="kpi-sub">Prep + delivery</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Avg distance</div>
        <div class="kpi-value">${round1(avg(dists))}<sup>km</sup></div>
        <div class="kpi-sub">Per order</div>
      </div>
      <div class="kpi ${outliers.length ? 'alert' : ''}">
        <div class="kpi-label">Flagged orders</div>
        <div class="kpi-value">${outliers.length}</div>
        <div class="kpi-sub">Prep outside 5–60 min</div>
      </div>
    </div>

    <!-- Channel + Hourly -->
    <div class="section-label">Channels & demand</div>
    <div class="card-grid-2">
      <div class="card">
        <div class="card-title">Orders by channel</div>
        ${Object.entries(channels).map(([ch, v]) => `
          <div class="ch-row">
            <span class="ch-name">${ch}</span>
            <div class="ch-bar-bg">
              <div class="ch-bar-fill" style="width:${Math.round(v.orders.length/data.length*100)}%;background:${ch==='Uber Direct'?'#CC0000':'#F09595'};"></div>
            </div>
            <span class="ch-count">${v.orders.length}</span>
          </div>
        `).join('')}
        <div class="ch-stats">
          ${Object.entries(channels).map(([ch, v]) => `
            <div>
              <div class="ch-stat-label">${ch} avg prep</div>
              <div class="ch-stat-value">${round1(avg(v.preps))} min</div>
            </div>
            <div>
              <div class="ch-stat-label">${ch} avg delivery</div>
              <div class="ch-stat-value">${round1(avg(v.delivs))} min</div>
            </div>
            <div>
              <div class="ch-stat-label">${ch} avg E2E</div>
              <div class="ch-stat-value">${round1(avg(v.e2es))} min</div>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-title">Orders by hour</div>
        <div class="heat-grid" role="img" aria-label="Order volume heatmap by hour">
          ${Object.entries(hours).map(([h, n]) => `
            <div class="heat-cell" title="${h}:00 — ${n} orders"
              style="background:${heatColor(n,maxHour)};color:${n/maxHour>0.5?'#fff':'#444'}">
              ${n||''}
            </div>
          `).join('')}
        </div>
        <div class="heat-labels">
          ${Object.keys(hours).map(h => `<div class="heat-label">${h}</div>`).join('')}
        </div>
        <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
          <div class="ch-stats">
            <div>
              <div class="ch-stat-label">Peak hour</div>
              <div class="ch-stat-value">${Object.entries(hours).sort((a,b)=>b[1]-a[1])[0][0]}:00</div>
            </div>
            <div>
              <div class="ch-stat-label">Peak volume</div>
              <div class="ch-stat-value">${maxHour} orders</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Hourly delays -->
    <div class="section-label">Delay hotspots by hour</div>
    <div class="card">
      <div class="card-title">Avg prep &amp; delivery time per hour — hours above daily average are highlighted</div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Hour</th>
            <th>Orders</th>
            <th>Avg prep (min)</th>
            <th>Avg delivery (min)</th>
            <th>Combined (min)</th>
            <th>Status</th>
          </tr></thead>
          <tbody>
          ${hourlyRows.map(r => {
            const bothHigh = r.prepDelay && r.delivDelay;
            const eitherHigh = r.prepDelay || r.delivDelay;
            return `<tr style="background:${bothHigh ? '#FFF5F5' : 'transparent'}">
              <td style="font-weight:500">${r.hour}:00</td>
              <td>${r.orders}</td>
              <td style="color:${r.prepDelay ? 'var(--red-dark)' : 'var(--ink)'}; font-weight:${r.prepDelay ? '600' : '400'}">${r.avgPrep} ${r.prepDelay ? '▲' : ''}</td>
              <td style="color:${r.delivDelay ? 'var(--red-dark)' : 'var(--ink)'}; font-weight:${r.delivDelay ? '600' : '400'}">${r.avgDeliv} ${r.delivDelay ? '▲' : ''}</td>
              <td style="font-weight:500">${round1(r.avgPrep + r.avgDeliv)}</td>
              <td>${bothHigh ? '<span class="badge badge-red">Both delayed</span>' : r.prepDelay ? '<span class="badge badge-red">Prep slow</span>' : r.delivDelay ? '<span class="badge badge-blue">Delivery slow</span>' : '<span style="color:var(--ink-3);font-size:11px">Normal</span>'}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>
      </div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;gap:24px;font-size:12px;color:var(--ink-3);">
        <span>▲ above daily average &nbsp;·&nbsp; Daily avg prep: <strong style="color:var(--ink)">${overallAvgPrep} min</strong></span>
        <span>Daily avg delivery: <strong style="color:var(--ink)">${overallAvgDeliv} min</strong></span>
      </div>
    </div>

    <!-- Distributions -->
    <div class="section-label">Time distributions</div>
    <div class="card-grid-2">
      <div class="card">
        <div class="card-title">Prep time (minutes)</div>
        <div class="chart-wrap"><canvas id="prepChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Delivery time (minutes)</div>
        <div class="chart-wrap"><canvas id="delivChart"></canvas></div>
      </div>
    </div>

    <!-- Flagged outliers -->
    <div class="section-label">Flagged orders ${outliers.length ? `<span style="color:var(--red);margin-left:6px;">${outliers.length} flagged</span>` : ''}</div>
    <div class="card">
      ${outliers.length === 0
        ? '<div class="empty" style="padding:24px"><strong>No flagged orders</strong>All prep and delivery times are within expected ranges.</div>'
        : `<div class="table-wrap"><table>
        <thead><tr>
          <th>Order ID</th><th>Brand</th><th>Date</th>
          <th>Prep (min)</th><th>Delivery (min)</th><th>Channel</th><th>Flag</th>
        </tr></thead>
        <tbody>
        ${outliers.map(r => {
          const flags = [];
          if (r['Prep Time'] > 60) flags.push('<span class="badge badge-red">Prep &gt; 60 min</span>');
          if (r['Prep Time'] < 5)  flags.push('<span class="badge badge-red">Prep &lt; 5 min</span>');
          if (r['Delivery Time'] < 5) flags.push('<span class="badge badge-blue">Delivery &lt; 5 min</span>');
          return `<tr>
            <td class="mono">${r['Order ID']}</td>
            <td>${r['Brand Name'] || '—'}</td>
            <td>${r['Order Date']}</td>
            <td>${r['Prep Time'] ?? '—'}</td>
            <td>${r['Delivery Time'] ?? '—'}</td>
            <td>${r['Delivery Channel']}</td>
            <td>${flags.join(' ')}</td>
          </tr>`;
        }).join('')}
        </tbody></table></div>`
      }
    </div>

    <!-- Brand table -->
    <div class="section-label">Top brands by volume</div>
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 32px;">
        ${topBrands.map((b, i) => `
          <div class="brand-row">
            <span class="brand-rank">${i+1}</span>
            <span class="brand-name">${b.name}</span>
            <span class="brand-orders">${b.count} orders</span>
            <span class="brand-prep" style="color:${b.avgPrep>30?'var(--red-dark)':'var(--ink)'}">${b.avgPrep} min</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  // Render charts after DOM update
  requestAnimationFrame(() => {
    distChart('prepChart', preps, '#CC0000');
    distChart('delivChart', delivs, '#CC0000');
  });
}

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────
document.getElementById('date-filter').addEventListener('change', render);
document.getElementById('channel-filter').addEventListener('change', render);
document.getElementById('brand-filter').addEventListener('change', render);

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
